<!DOCTYPE html>
<html>
<head>
  <title>QR Generator</title>
  <style>
    body{
      font-family:Arial;
      background:#f5f5f5;
      padding:40px;
    }

    .box{
      max-width:550px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:15px;
      box-shadow:0 0 20px rgba(0,0,0,0.1);
    }

    input,button{
      width:100%;
      padding:12px;
      margin-top:12px;
      box-sizing:border-box;
    }

    button{
      background:#111;
      color:white;
      border:0;
      border-radius:8px;
      cursor:pointer;
    }

    img{
      max-width:250px;
      margin-top:20px;
    }

    a{
      display:block;
      margin-top:15px;
      word-break:break-all;
    }

    hr{
      margin:25px 0;
    }

    h2{
      margin-bottom:5px;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>QR Generator</h1>

  <hr>

  <h2>Upload File / Image</h2>
  <input type="file" id="fileInput">
  <button onclick="uploadFile()">Upload & Generate QR</button>

  <hr>

  <h2>Generate QR from URL</h2>
  <input type="text" id="urlInput" placeholder="https://example.com">
  <button onclick="generateUrlQR()">Generate URL QR</button>

  <div id="result"></div>
</div>

<script>
async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Please select a file");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  showResult(data.qr, data.url);
}

async function generateUrlQR() {
  let url = document.getElementById("urlInput").value.trim();

  if (!url) {
    alert("Please enter URL");
    return;
  }

  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    url = "https://" + url;
  }

  const res = await fetch("/generate-url-qr", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ url })
  });

  const data = await res.json();
  showResult(data.qr, data.url);
}

function showResult(qr, url) {
  document.getElementById("result").innerHTML = `
    <img src="${qr}" alt="QR Code">
    <a href="${url}" target="_blank">${url}</a>
    <br>
    <button onclick="downloadQR('${qr}')">Download QR</button>
  `;
}

function downloadQR(qr) {
  const a = document.createElement("a");
  a.href = qr;
  a.download = "qr-code.png";
  a.click();
}
</script>

</body>
</html>
